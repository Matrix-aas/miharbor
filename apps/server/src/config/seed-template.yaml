mode: rule
log-level: info
ipv6: false
allow-lan: false
external-controller: 127.0.0.1:9090
secret: __MIHARBOR_SEED_SECRET__
interface-name: eth0
tun:
  enable: true
  stack: system
  device: mihomo-tun
  dns-hijack: []
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
sniffer:
  enable: false
dns:
  enable: true
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
proxies: []
proxy-groups:
  - name: Default
    type: select
    proxies:
      - DIRECT
rules:
  - MATCH,Default
