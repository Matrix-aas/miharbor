# CI — runs on every push to main and on every PR targeting main.
#
# Design notes:
#  * Single job (check) keeps the feedback loop tight — full matrix is for
#    the release workflow, not CI.
#  * `e2e` job only runs on push-to-main (i.e. after merge). Feature-branch
#    PRs don't pay the Playwright setup cost on every push; they do pay for
#    lint/typecheck/unit tests.
#  * Bun version pinned to match bunfig.toml + Dockerfile (1.3.11).
#  * `--frozen-lockfile` enforces lockfile integrity — if a PR changes
#    dependencies without committing bun.lock, CI fails.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: lint + typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: i18n parity check (RU ↔ EN)
        run: bun run i18n:check

      - name: Lint
        run: bun run --filter='*' lint

      - name: Typecheck
        run: bun run --filter='*' typecheck

      - name: Server + shared unit tests
        run: bun test

      - name: Web (Vitest) tests
        run: bun run --filter miharbor-web test

      - name: Web build
        run: bun run --filter miharbor-web build

  e2e:
    name: e2e smoke (Playwright)
    # Only run after merge to main — not on every feature-branch PR. E2E
    # setup (Playwright download, compose spin-up) is heavier than unit
    # tests, and a broken e2e on PR is rare enough that blocking every PR
    # on it isn't worth the wait.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Web build (needed for Playwright webServer fixture)
        run: bun run --filter miharbor-web build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run e2e
        run: bun run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
