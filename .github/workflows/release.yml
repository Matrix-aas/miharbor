# Release workflow — triggered by pushing a `v*.*.*` tag.
#
# What it does:
#  1. Builds a multi-arch (linux/amd64 + linux/arm64) image via docker buildx
#     and pushes to GHCR as `ghcr.io/<owner>/miharbor:<version>` and `:latest`.
#  2. Generates an SPDX SBOM with Anchore's sbom-action and attaches it to
#     the GitHub Release so downstream users can audit the dependency tree.
#  3. Publishes a GitHub Release with auto-generated changelog (extracted from
#     merged PRs since the previous tag, via GitHub's native generator).
#
# Trigger test: `git tag v0.1.0 && git push origin v0.1.0`.
#
# Required repo settings (one-time, not in this workflow):
#  * Actions → Workflow permissions → "Read and write permissions".
#  * First push of an image to a new package will make the GHCR package
#    private by default — toggle to public under the package settings.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create GitHub Release
  packages: write # push to GHCR
  id-token: write # future: cosign / sigstore attestations

jobs:
  release:
    name: build + push + release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changelog generator needs full history

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Sanity check — run tests before publishing
        run: |
          bun run --filter='*' typecheck
          bun test
          bun run --filter miharbor-web test

      - name: Extract metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: dockermeta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.meta.outputs.owner_lc }}/miharbor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.dockermeta.outputs.tags }}
          labels: ${{ steps.dockermeta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ steps.meta.outputs.owner_lc }}/miharbor:${{ steps.meta.outputs.version }}
          format: spdx-json
          artifact-name: miharbor-${{ steps.meta.outputs.version }}-sbom.spdx.json
          output-file: miharbor-sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            miharbor-sbom.spdx.json
          body: |
            ## Miharbor ${{ steps.meta.outputs.tag }}

            Docker image: `ghcr.io/${{ steps.meta.outputs.owner_lc }}/miharbor:${{ steps.meta.outputs.version }}`

            ```bash
            docker pull ghcr.io/${{ steps.meta.outputs.owner_lc }}/miharbor:${{ steps.meta.outputs.version }}
            ```

            Supported platforms: `linux/amd64`, `linux/arm64`.

            See [README](https://github.com/${{ github.repository }}/blob/${{ steps.meta.outputs.tag }}/README.md) for the quick-start guide.

            ### Attestations

            - SPDX SBOM is attached to this release as `miharbor-sbom.spdx.json`.
            - Build provenance (SLSA) is published alongside the image via buildx.
