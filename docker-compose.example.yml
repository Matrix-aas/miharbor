# Miharbor — example Docker Compose
#
# Copy to `docker-compose.yml`, fill in `.env` (see .env.example), then:
#   docker compose up -d
#
# Miharbor listens on :3000 inside the container. We bind to 127.0.0.1 so
# only the host loopback can reach it — expose it to the LAN via a reverse
# proxy with TLS (nginx/caddy/traefik), never directly.
#
# Two bind mounts matter:
#   /config      — the directory containing your mihomo config.yaml. The path
#                  MUST match what mihomo itself reads on the host, otherwise
#                  deploys land in the wrong file. Read-write required
#                  (Miharbor needs to write back after each deploy).
#   /app/data    — Miharbor's own state: encrypted snapshot history, vault
#                  key, auth.json, audit log. BACK THIS UP (see docs/BACKUP.md).

services:
  miharbor:
    image: ghcr.io/matrix-aas/miharbor:latest
    container_name: miharbor
    restart: unless-stopped
    ports:
      # Loopback-only — put nginx/caddy/traefik in front of this.
      - '127.0.0.1:3000:3000'
    volumes:
      # Bind the same mihomo config directory your running mihomo reads.
      - /etc/mihomo:/config:rw
      # Persistent state (named volume — survives container recreation).
      - miharbor_data:/app/data
    environment:
      MIHARBOR_TRANSPORT: local
      MIHARBOR_CONFIG_PATH: /config/config.yaml
      MIHARBOR_DATA_DIR: /app/data

      # mihomo REST API — reachable at the host's gateway because mihomo
      # normally runs on the host. Adjust if your setup differs (e.g. another
      # container name, or a remote host).
      MIHOMO_API_URL: http://host.docker.internal:9090
      MIHOMO_API_SECRET: ${MIHOMO_API_SECRET}

      # Admin credentials. Generate pass hash with:
      #   docker run --rm oven/bun:1.3.11-alpine \
      #     bun -e 'console.log(await Bun.password.hash("your-password"))'
      MIHARBOR_AUTH_USER: admin
      MIHARBOR_AUTH_PASS_HASH: ${MIHARBOR_AUTH_PASS_HASH}

      # 32-byte (64 hex chars) key for snapshot vault encryption. Generate:
      #   openssl rand -hex 32
      # CRITICAL: losing this key makes every historical snapshot unreadable.
      MIHARBOR_VAULT_KEY: ${MIHARBOR_VAULT_KEY}

      # Optional tunables.
      MIHARBOR_LOG_LEVEL: info
      MIHARBOR_AUTO_ROLLBACK: 'true'
    extra_hosts:
      # Linux compatibility — Docker Desktop for Mac/Windows resolves this
      # automatically; on plain Linux we need the explicit gateway alias.
      - 'host.docker.internal:host-gateway'

volumes:
  miharbor_data:
# ---------------------------------------------------------------------------
# Alternative: SSH transport
# ---------------------------------------------------------------------------
# If Miharbor runs elsewhere than the mihomo host, set MIHARBOR_TRANSPORT=ssh
# and point it at the remote. See docs/SSH_SETUP.md for the full setup and
# troubleshooting guide. Minimal overrides (replacing the `environment:` block
# above):
#
#   MIHARBOR_TRANSPORT: ssh
#   MIHARBOR_SSH_HOST: router.lan
#   MIHARBOR_SSH_USER: matrix
#   MIHARBOR_SSH_KEY_PATH: /ssh/key         # bind-mount the private key
#   MIHARBOR_SSH_REMOTE_CONFIG_PATH: /etc/mihomo/config.yaml
#   MIHARBOR_SSH_REMOTE_LOCK_PATH: /etc/mihomo/.miharbor.lock
#   MIHOMO_API_URL: http://router.lan:9090
#
#   # Host-key verification — pick ONE. Miharbor refuses to start otherwise.
#   # (A) Preferred: pin against a known_hosts file, generated once with
#   #     `ssh-keyscan -t ed25519,rsa,ecdsa router.lan > known_hosts`.
#   MIHARBOR_SSH_KNOWN_HOSTS: /ssh/known_hosts
#   # (B) First-contact / lab: accept any host key (NOT SAFE on hostile nets).
#   # MIHARBOR_SSH_HOST_KEY_INSECURE: 'true'
#
# Plus read-only mounts (the key file AND, for option A, the known_hosts file):
#   - /home/matrix/.ssh/miharbor_ed25519:/ssh/key:ro
#   - /etc/miharbor/known_hosts:/ssh/known_hosts:ro
